name: CI Pipeline

# Trigger on push to any branch and pull requests
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:  # Allow manual trigger

# Cancel in-progress runs if new commit pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # TEST JOB
  # ============================================================================

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    # Service containers for database
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # ========================================================================
      # SETUP
      # ========================================================================

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov ruff httpx

      # ========================================================================
      # LINTING & FORMATTING
      # ========================================================================

      - name: Lint with Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Type check with mypy
        run: |
          mypy app/ --ignore-missing-imports
        continue-on-error: true  # Don't fail on type errors yet

      # ========================================================================
      # TESTING
      # ========================================================================

      - name: Seed the Database with Python Script
        env:
          # Inject the connection string so your script knows where to insert the data
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

        run: |
          # 1. Run a quick script to import models and initialize the database schema
          python -c "
          import asyncio
          # MUST import models so Base.metadata registers them!
          import app.models
          from app.database import init_db

          async def setup():
              await init_db()

          asyncio.run(setup())
          "

          # 2. Run your data seeder
          python -m app.seed_database

      - name: 🧪 Run Agent & Worker Tests (Batch 1)
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SECRET_KEY: super-secret-test-key-that-is-at-least-32-chars
          ENVIRONMENT: test
        run: |
          # Runs lightweight agent logic tests first
          pytest tests/test_account_agent.py tests/test_general_agent.py tests/test_human_agent.py tests/test_product_agent.py -v --tb=short --disable-warnings --cov=app --cov-append --cov-report=term-missing --cov-report=xml

      - name: 🧠 Run Heavy ML Classifiers (Batch 2)
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SECRET_KEY: super-secret-test-key-that-is-at-least-32-chars
          ENVIRONMENT: test
        run: |
          # Forces OS to clear RAM before loading Spacy/Sentence-Transformers again
          # Uses --cov-append so we don't lose Batch 1's coverage data!
          pytest tests/test_intent_classifier.py tests/test_compliance_checker.py -v --tb=short --disable-warnings --cov=app --cov-append --cov-report=term-missing --cov-report=xml

      # ========================================================================
      # HEAVY INTEGRATION TESTS (Split to prevent OOM)
      # ========================================================================

      - name: 🏗️ Run E2E Coordinator Integration (Part 1)
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SECRET_KEY: super-secret-test-key-that-is-at-least-32-chars
          ENVIRONMENT: test
        run: |
          pytest tests/test_coordinator1.py -v --tb=short --disable-warnings --cov=app --cov-append --cov-report=term-missing --cov-report=xml

      - name: 🏗️ Run E2E Coordinator Integration (Part 2)
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SECRET_KEY: super-secret-test-key-that-is-at-least-32-chars
          ENVIRONMENT: test
        if: always()
        run: |
          pytest tests/test_coordinator2.py -v --tb=short --disable-warnings --cov=app --cov-append --cov-report=term-missing --cov-report=xml

      - name: 🏗️ Run E2E Coordinator Integration (Part 3)
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SECRET_KEY: super-secret-test-key-that-is-at-least-32-chars
          ENVIRONMENT: test
        if: always()
        run: |
          pytest tests/test_coordinator3.py -v --tb=short --disable-warnings --cov=app --cov-append --cov-report=term-missing --cov-report=xml


      - name: 🏗️ Run Full workflow (Part 1)
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SECRET_KEY: super-secret-test-key-that-is-at-least-32-chars
          ENVIRONMENT: test
        if: always()
        run: |
          pytest tests/test_full_workflow1.py -v --tb=short --disable-warnings --cov=app --cov-append --cov-report=term-missing --cov-report=xml

      - name: 🏗️ Run Full workflow (Part 2)
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SECRET_KEY: super-secret-test-key-that-is-at-least-32-chars
          ENVIRONMENT: test
        if: always()
        run: |
          pytest tests/test_full_workflow2.py -v --tb=short --disable-warnings --cov=app --cov-append --cov-report=term-missing --cov-report=xml

      - name: 🏗️ Run Rag
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SECRET_KEY: super-secret-test-key-that-is-at-least-32-chars
          ENVIRONMENT: test
        if: always()
        run: |
          pytest tests/test_rag_search.py -v --tb=short --disable-warnings --cov=app --cov-append --cov-report=term-missing --cov-report=xml





  # ============================================================================
  # BUILD JOB
  # ============================================================================

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test  # Only build if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          push: false
          tags: fca-support:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm fca-support:${{ github.sha }} python -c "import app; print('✓ Import successful')"
