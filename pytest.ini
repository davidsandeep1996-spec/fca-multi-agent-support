[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
filterwarnings =
    # Ignore specific third-party deprecation warnings
    ignore:'crypt' is deprecated:DeprecationWarning:passlib.*
    ignore:'BaseCommand' is deprecated:DeprecationWarning:typer.*
    ignore:.*split_arg_string.*:DeprecationWarning:spacy.*
    ignore:.*split_arg_string.*:DeprecationWarning:weasel.*
    ignore:PyPDF2 is deprecated:DeprecationWarning:PyPDF2.*
